<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Skulpt Sandbox</title>
    <style>
      body {
        font-family: monospace;
        display: flex;
        gap: 20px;
        padding: 20px;
      }

      textarea {
        width: 400px;
        height: 300px;
      }

      #output {
        width: 400px;
        height: 300px;
        background: #111;
        color: #0f0;
        padding: 10px;
        overflow-y: auto;
        white-space: pre-wrap;
      }

      button {
        margin-top: 10px;
        padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <div>
      <h3>Python Code</h3>
      <textarea id="code">
print("Hello from Skulpt!")
for i in range(5):
    print(i)
    </textarea
      >
      <br />
      <button onclick="runPython()">Run</button>
    </div>

    <div>
      <h3>Output</h3>
      <div id="output"></div>
    </div>

    <!-- Load Skulpt -->
    <script src="runtime/skulpt.min.js"></script>
    <script src="runtime/skulpt-stdlib.js"></script>

    <script>
      function builtinRead(x) {
        if (
          Sk.builtinFiles === undefined ||
          Sk.builtinFiles["files"][x] === undefined
        ) {
          throw "File not found: '" + x + "'";
        }
        return Sk.builtinFiles["files"][x];
      }

      async function runPython() {
        const output = document.getElementById("output");
        output.textContent = ""; // clear previous output

        const code = document.getElementById("code").value;

        Sk.configure({
          output: function (text) {
            output.textContent += text;
          },
          read: builtinRead,
          __future__: Sk.python3,
        });

        try {
          await Sk.misceval.asyncToPromise(function () {
            return Sk.importMainWithBody("<stdin>", false, code, true);
          });
        } catch (err) {
          output.textContent += "\n" + err.toString();
        }
      }
    </script>
  </body>
</html>
